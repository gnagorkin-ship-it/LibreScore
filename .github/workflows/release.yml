name: Release
on:
  push: { tags: ['v*'] }
jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - uses: android-actions/setup-android@v3
      - name: Decode signing key
        if: env.KEYSTORE_BASE64 != ''
        env: { KEYSTORE_BASE64: '${{ secrets.KEYSTORE_BASE64 }}' }
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore && echo "RELEASE_KEYSTORE_PATH=$PWD/release.keystore" >> $GITHUB_ENV
      - run: gradle assembleRelease bundleRelease
        env: { KEYSTORE_PASSWORD: '${{ secrets.KEYSTORE_PASSWORD }}', KEY_ALIAS: '${{ secrets.KEY_ALIAS }}', KEY_PASSWORD: '${{ secrets.KEY_PASSWORD }}' }
      - run: find app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) -print0 | xargs -0 sha256sum > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with: { generate_release_notes: true, files: |
          app/build/outputs/**/*.apk
          app/build/outputs/**/*.aab
          SHA256SUMS.txt }
